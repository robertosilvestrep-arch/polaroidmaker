</html><!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>FotoStúdio — Plataforma Criativa Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-primary: #F8F7F4;
  --bg-secondary: #FFFFFF;
  --surface: #FFFFFF;
  --surface-hover: #F5F3F0;
  --text-primary: #1E1B1A;
  --text-secondary: #6B635C;
  --text-muted: #9B938C;
  --accent: #C45F2C;
  --accent-light: #E87A42;
  --accent-dark: #A34A1E;
  --accent-soft: #FEF5EF;
  --success: #2F6B4F;
  --border: #E8E4DF;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-lg: 0 12px 28px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.02);
  --shadow-hover: 0 20px 32px rgba(0,0,0,0.12), 0 4px 8px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, .font-serif {
  font-family: 'Playfair Display', serif;
}

.app {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  z-index: 100;
  transition: width 0.25s ease;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar.collapsed {
  width: 80px;
}

.sidebar.collapsed .sidebar-logo-text,
.sidebar.collapsed .nav-item span,
.sidebar.collapsed .sidebar-footer p {
  opacity: 0;
  width: 0;
  display: none;
}

.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.sidebar-logo h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.sidebar-logo span {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
  display: block;
}

.toggle-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: var(--surface-hover);
  border: 1px solid var(--border);
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}

.toggle-btn:hover {
  background: var(--border);
  transform: scale(1.02);
}

.nav {
  flex: 1;
  padding: 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  cursor: pointer;
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
  white-space: nowrap;
}

.nav-item:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}

.nav-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.sidebar-footer {
  padding: 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
}

.main {
  margin-left: 280px;
  flex: 1;
  transition: margin-left 0.25s ease;
}

.main.collapsed {
  margin-left: 80px;
}

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.95);
}

.topbar-left h2 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
}

.topbar-left p {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.topbar-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

.btn {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-primary);
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn:hover {
  background: var(--surface-hover);
  transform: translateY(-1px);
}

.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.btn-primary:hover {
  background: var(--accent-dark);
  border-color: var(--accent-dark);
  transform: translateY(-1px);
}

.btn-success {
  background: var(--success);
  color: white;
  border-color: var(--success);
}

.btn-success:hover {
  background: #235a42;
  transform: translateY(-1px);
}

.fmt-toggle {
  display: flex;
  background: var(--surface-hover);
  border-radius: var(--radius-sm);
  padding: 4px;
  gap: 4px;
}

.fmt-btn {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--text-muted);
  font-weight: 500;
  transition: var(--transition);
}

.fmt-btn.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: var(--shadow-sm);
}

.content {
  padding: 32px;
  min-height: calc(100vh - 73px);
}

.section {
  display: none;
  animation: fadeInUp 0.3s ease;
}

.section.active {
  display: block;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}

.card:hover {
  box-shadow: var(--shadow-md);
}

.card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.tag-pill {
  display: inline-block;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 20px;
  background: var(--accent-soft);
  color: var(--accent);
  margin-bottom: 20px;
}

.livre-layout,
.cal-layout,
.album-layout,
.marcador-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 24px;
}

.folhinha-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.canvas-wrap {
  background: var(--bg-secondary);
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  min-height: 500px;
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}

.canvas-wrap.has-photos {
  background: var(--bg-primary);
}

/* Estilos das polaroides com molduras */
.polaroid {
  position: absolute;
  background: white;
  padding: 10px 10px 34px;
  box-shadow: var(--shadow-md);
  cursor: grab;
  transition: box-shadow 0.2s, transform 0.1s;
  border-radius: 3px;
  user-select: none;
}

.polaroid:hover {
  box-shadow: var(--shadow-hover);
  z-index: 100;
}

.polaroid.dragging {
  cursor: grabbing;
  opacity: 0.9;
}

.polaroid-img-wrap {
  overflow: hidden;
  display: block;
  line-height: 0;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
}

.polaroid-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain !important;
  display: block !important;
}

/* Molduras específicas */
.frame-classic { background: #fff; padding: 10px 10px 34px; }
.frame-creme { background: #FBF6EC; padding: 10px 10px 34px; }
.frame-kraft { background: #C8A882; padding: 10px 10px 34px; }
.frame-dark { background: #1a1a1a; padding: 10px 10px 34px; }
.frame-dark .caption-editable { color: rgba(255,255,255,0.7); }
.frame-film { background: #111; padding: 14px 18px 34px; }
.frame-vintage { background: #F0E6D0; padding: 10px 10px 34px; }
.frame-vintage img { filter: sepia(0.55) brightness(1.05); }
.frame-rosa { background: #FDE8F0; padding: 10px 10px 34px; }
.frame-azul { background: #E8F0FD; padding: 10px 10px 34px; }
.frame-verde { background: #E8F5E0; padding: 10px 10px 34px; }
.frame-dupla { background: #fff; padding: 12px 12px 36px; outline: 3px double #c8b89a; outline-offset: 3px; }
.frame-larga { background: #fff; padding: 10px 10px 52px; }
.frame-minimal { background: #fff; padding: 8px 8px 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.08) !important; }
.frame-neon { background: #0d0d0d; padding: 10px 10px 34px; border: 2px solid #00ffcc; }
.frame-neon .caption-editable { color: #00ffcc !important; }
.frame-aquarela { background: linear-gradient(135deg,#fce4ec,#e8f5e9,#e3f2fd); padding: 10px 10px 34px; }
.frame-retro70 { background: #E8651A; padding: 10px 10px 34px; }
.frame-gold { background: #1a1100; padding: 12px 12px 36px; border: 2px solid #c9a227; }
.frame-gold .caption-editable { color: #c9a227 !important; }

.caption-editable {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  border: none;
  border-bottom: 1px dashed transparent;
  background: transparent;
  outline: none;
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 10px;
  color: var(--text-muted);
  cursor: text;
  padding: 2px 4px;
  border-radius: 4px;
  width: calc(100% - 16px);
  opacity: 0.7;
  transition: opacity 0.2s;
}

.caption-editable:hover {
  border-bottom-color: var(--border);
  opacity: 1;
}

.caption-editable:focus {
  background: rgba(0,0,0,0.03);
  border-bottom-color: var(--accent);
  opacity: 1;
}

.remove-btn {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #e74c3c;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 14px;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.polaroid:hover .remove-btn {
  display: flex;
}

.frames-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}

.frames-grid::-webkit-scrollbar {
  width: 4px;
}

.frames-grid::-webkit-scrollbar-track {
  background: var(--border);
  border-radius: 4px;
}

.frames-grid::-webkit-scrollbar-thumb {
  background: var(--text-muted);
  border-radius: 4px;
}

.frame-swatch {
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
  cursor: pointer;
  font-size: 11px;
  color: var(--text-secondary);
  transition: var(--transition);
  background: var(--surface);
}

.frame-swatch:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
}

.frame-swatch.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 500;
}

.swatch-preview {
  width: 100%;
  height: 40px;
  margin-bottom: 6px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.drop-hint {
  text-align: center;
  pointer-events: none;
  padding: 80px 20px;
}

.drop-hint button,
.drop-hint label {
  pointer-events: all;
}

.drop-hint .icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.upload-btn-big {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
  margin-top: 16px;
}

.upload-btn-big:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--text-primary);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s ease;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 420px;
  width: 90%;
  box-shadow: var(--shadow-lg);
}

.modal h3 {
  font-size: 20px;
  margin-bottom: 12px;
}

.modal p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  line-height: 1.6;
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
}

input[type="file"] {
  display: none;
}

.bg-swatch {
  transition: var(--transition);
  cursor: pointer;
}

.bg-swatch:hover {
  transform: scale(1.02);
}

/* MURAL - VARAL COM FOTOS PRESAS POR PREGADORES */
#canvas-mural {
  position: relative;
  overflow: hidden;
  background-size: cover;
  background-position: center;
  transition: background 0.3s ease;
  border-radius: var(--radius-lg);
  cursor: default;
}

/* Corda do varal */
.mural-rope {
  position: absolute;
  left: 30px;
  right: 30px;
  height: 4px;
  background: linear-gradient(90deg, #8B5A2B, #C8A882, #8B5A2B);
  border-radius: 2px;
  cursor: ns-resize;
  z-index: 10;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  transition: top 0.05s linear;
}

.mural-rope:hover {
  height: 5px;
  background: linear-gradient(90deg, #9B6A3B, #D8B892, #9B6A3B);
}

.mural-rope.dragging-rope {
  opacity: 0.8;
  cursor: grabbing;
}

/* Pregadores nas extremidades da corda */
.mural-clip-left,
.mural-clip-right {
  position: absolute;
  width: 16px;
  height: 20px;
  background: radial-gradient(ellipse at 30% 40%, #B87C4A, #8B5A2B);
  border-radius: 2px 2px 8px 8px;
  z-index: 11;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.mural-clip-left::before,
.mural-clip-right::before {
  content: '';
  position: absolute;
  top: -4px;
  left: 2px;
  width: 12px;
  height: 6px;
  background: #D49C6A;
  border-radius: 2px;
}

.mural-clip-left::after,
.mural-clip-right::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 4px;
  width: 8px;
  height: 4px;
  background: #6B3A1A;
  border-radius: 1px;
}

/* Foto pendurada no varal */
.mural-photo {
  position: absolute;
  cursor: grab;
  user-select: none;
  transition: box-shadow 0.2s, transform 0.1s;
  z-index: 5;
}

.mural-photo.dragging {
  cursor: grabbing;
  opacity: 0.9;
  z-index: 999 !important;
}

/* Estilo polaroide para o mural */
.mural-photo.pol {
  background: white;
  padding: 8px 8px 28px 8px;
  box-shadow: var(--shadow-md);
  border-radius: 3px;
}

.mural-photo.sim {
  background: white;
  padding: 5px;
  box-shadow: var(--shadow-sm);
  border: 2px solid #e0d0b0;
  border-radius: 3px;
}

/* Pregador que prende a foto na corda */
.mural-photo-clip {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 22px;
  background: radial-gradient(ellipse at 30% 40%, #C88C5A, #9B6A3B);
  border-radius: 2px 2px 10px 10px;
  z-index: 6;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.mural-photo-clip::before {
  content: '';
  position: absolute;
  top: -6px;
  left: 4px;
  width: 12px;
  height: 8px;
  background: #E8AC7A;
  border-radius: 2px;
}

.mural-photo-clip::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 6px;
  width: 8px;
  height: 5px;
  background: #7B4A22;
  border-radius: 1px;
}

.mural-photo .mp-inner {
  position: relative;
  display: block;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.mural-photo .mp-inner img {
  object-fit: contain !important;
  display: block !important;
}

/* Barbante que conecta o pregador à foto (opcional) */
.mural-string {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 8px;
  background: repeating-linear-gradient(to bottom, #C8A882 0, #C8A882 2px, #8B6145 2px, #8B6145 4px);
  border-radius: 1px;
  z-index: 5;
}

.mural-photo .mp-rm {
  display: none;
  position: absolute;
  top: -8px;
  right: -8px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #e74c3c;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 14px;
  align-items: center;
  justify-content: center;
  z-index: 20;
}

.mural-photo:hover .mp-rm {
  display: flex;
}

.mural-txt {
  position: absolute;
  cursor: move;
  z-index: 15;
}

.mural-txt textarea {
  background: rgba(255, 255, 255, 0.95);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  resize: both;
  outline: none;
  width: 140px;
  min-height: 50px;
}

.mural-txt textarea:focus {
  border-color: var(--accent);
  background: white;
  box-shadow: var(--shadow-sm);
}

.mt-rm {
  display: none;
  position: absolute;
  top: -8px;
  right: -8px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #e74c3c;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 11px;
  align-items: center;
  justify-content: center;
}

.mural-txt:hover .mt-rm {
  display: flex;
}

/* Legenda mais discreta no mural */
.mural-photo .mp-inner input {
  width: 90%;
  font-size: 9px;
  padding: 2px 4px;
  border: none;
  border-bottom: 1px solid transparent;
  background: transparent;
  text-align: center;
  font-family: 'Playfair Display', serif;
  color: var(--text-muted);
  opacity: 0.6;
  transition: opacity 0.2s;
  margin-top: 6px;
}

.mural-photo .mp-inner input:hover {
  opacity: 1;
  border-bottom-color: var(--border);
}

.mural-photo .mp-inner input:focus {
  opacity: 1;
  border-bottom-color: var(--accent);
  outline: none;
}

/* Ajuda */
.ajuda-hero {
  background: linear-gradient(135deg, var(--text-primary) 0%, #2D2A25 100%);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 24px;
}

.ajuda-hero h2 {
  font-size: 28px;
  color: white;
  margin-bottom: 8px;
}

.ajuda-hero p {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  max-width: 500px;
  line-height: 1.6;
}

.ajuda-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 28px;
}

.ajuda-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.ajuda-card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  cursor: pointer;
  transition: var(--transition);
}

.ajuda-card-header:hover {
  background: var(--surface-hover);
}

.ajuda-cat-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.ajuda-card-header h3 {
  flex: 1;
  font-size: 16px;
  font-weight: 600;
}

.ajuda-chevron {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.ajuda-card-header.open .ajuda-chevron {
  transform: rotate(90deg);
}

.ajuda-steps {
  display: none;
  padding: 0 20px 20px;
}

.ajuda-steps.open {
  display: block;
}

.step {
  display: flex;
  gap: 14px;
  margin-top: 16px;
}

.step-num {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.tip-box {
  background: var(--accent-soft);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--accent-dark);
  line-height: 1.6;
}

.tema-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.tema-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: var(--transition);
}

.tema-dot:hover {
  transform: scale(1.1);
}

.tema-dot.selected {
  border-color: var(--text-primary);
  box-shadow: 0 0 0 2px var(--accent-soft);
}

.marc-group {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  overflow: hidden;
}

.marc-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  transition: var(--transition);
}

.marc-group-header:hover {
  background: var(--surface-hover);
}

.marc-group-body {
  display: none;
  padding: 8px 10px;
  background: var(--surface-hover);
  flex-wrap: wrap;
  gap: 5px;
}

.marc-group-body.open {
  display: flex;
}

.marc-sub-btn {
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: var(--transition);
}

.marc-sub-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.marc-sub-btn.selected {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
}

.marcador-ribbon,
.marcador-footer,
.marcador-top {
  transition: background 0.2s;
}

.marcador-top {
  position: relative;
  width: 100%;
  height: 24px;
  overflow: hidden;
}

.marc-top-v .marcador-top::before {
  content: '';
  position: absolute;
  inset: 0;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  background: inherit;
}

.marc-top-arc .marcador-top::before {
  content: '';
  position: absolute;
  inset: 0;
  clip-path: ellipse(55% 100% at 50% 0%);
  background: inherit;
}

.marc-top-ret .marcador-top::before {
  content: '';
  position: absolute;
  inset: 0;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
  background: inherit;
}

.marc-top-zig .marcador-top::before {
  content: '';
  position: absolute;
  inset: 0;
  clip-path: polygon(0 0, 100% 0, 88% 45%, 75% 10%, 62% 55%, 50% 100%, 38% 55%, 25% 10%, 12% 45%);
  background: inherit;
}

@media (max-width: 900px) {

    width: 72px;

    display: none;

  .topbar {

  .content {
    padding: 20px;
  }
  .ajuda-grid {
    grid-template-columns: 1fr;
  }
}

.mname {

  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-primary);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

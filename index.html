<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>PolaroidMaker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
<h2>POLAROID</h2>

<button onclick="setCategoria('livre')">Livre</button>
<button onclick="setCategoria('calendario')">Calendário</button>
<button onclick="setCategoria('folhinha')">Folhinha</button>
<button onclick="setCategoria('album')">Álbum</button>
<button onclick="setCategoria('marcador')">Marcador</button>
<button onclick="setCategoria('mural')">Mural</button>

<input type="file" id="upload" multiple>
</div>

<div id="world">
<div id="camera"></div>
</div>

<div class="framesPanel">
<h3>Molduras</h3>

<button onclick="setFrame('polaroid')">Polaroid</button>
<button onclick="setFrame('neon')">Neon</button>
<button onclick="setFrame('glass')">Glass</button>
<button onclick="setFrame('minimal')">Minimal</button>
<button onclick="setFrame('scrap')">Scrap</button>

</div>

<script src="app.js"></script>

</body>
</html>

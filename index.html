<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Polaroid Maker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h2>📸 Polaroid</h2>

<div class="menuItem" onclick="showTab('mural')">🖼️ Mural</div>
<div class="menuItem" onclick="showTab('livre')">🎨 Livre</div>
<div class="menuItem" onclick="showTab('album')">📁 Álbum</div>

<input type="file" id="upload" multiple>
</div>

<div class="content">

<div id="mural" class="tab active">
<div class="frame">
<div class="rope r1"></div>
<div class="rope r2"></div>
<div class="rope r3"></div>
<div id="photos"></div>
</div>
</div>

<div id="livre" class="tab">
<div id="canvasLivre" class="canvas-livre"></div>
</div>

<div id="album" class="tab">
<div id="albumArea"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
